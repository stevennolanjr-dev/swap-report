name: FORMAT_LOCK gate + deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  gate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: FORMAT_LOCK gate (verify_format.py) — index.html
        run: |
          python3 gates/verify_format.py index.html
          echo "::notice::FORMAT_LOCK gate passed for index.html"

      - name: FORMAT_LOCK gate — archive snapshots
        run: |
          shopt -s nullglob
          fail=0
          for f in archive/[0-9]*.html; do
            echo "--- $f ---"
            python3 gates/verify_format.py "$f" || fail=1
          done
          if [ "$fail" = "1" ]; then
            echo "::error::One or more archive snapshots violate FORMAT_LOCK."
            exit 1
          fi
          echo "::notice::All archive snapshots passed FORMAT_LOCK."

      - name: URL reachability gate (verify_urls_reachable.py)
        env:
          SWAP_URL_TIMEOUT: "15"
          SWAP_URL_PARALLEL: "16"
          SWAP_URL_RETRIES: "2"
        run: |
          python3 gates/verify_urls_reachable.py index.html
          echo "::notice::URL reachability gate passed."

      - name: Build metrics summary
        run: |
          if [ -f gates/build_metrics.py ]; then
            python3 gates/build_metrics.py index.html >> "$GITHUB_STEP_SUMMARY" || true
          else
            echo "build_metrics.py not present yet — skipping metrics summary."
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
